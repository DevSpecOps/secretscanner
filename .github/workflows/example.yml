name: Example secret scan

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run SecretScanner
        uses: DevSpecOps/secretscanner@v0.1.0
        with:
          path: '.'
          dry-run: false